# GitHub Actions Workflow: Deploy HTML Mockup to GitHub Pages
#
# This workflow deploys the mockup/index.html file to GitHub Pages
# so anyone can view the interactive mockup without installing Node.js.
#
# URL after deployment: https://qays7753.github.io/Accounting/
#
# Setup instructions:
# 1. Go to repo Settings → Pages
# 2. Under "Source", select "GitHub Actions"
# 3. Push to main branch — this workflow will run automatically
# 4. Wait ~1 minute, then visit the URL above

name: Deploy Mockup to GitHub Pages

on:
  # Trigger on every push to main that changes the mockup
  push:
    branches: [main]
    paths:
      - 'mockup/**'
      - '.github/workflows/deploy-mockup.yml'
  # Allow manual trigger
  workflow_dispatch:

# Permissions needed for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-mockup:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Upload the mockup folder as the Pages artifact
      - name: Upload mockup artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Deploy only the mockup folder
          path: './mockup'

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Step 5: Print the URL
      - name: Print deployment URL
        run: |
          echo "✅ Mockup deployed successfully!"
          echo "🔗 URL: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "Share this link with anyone who wants to preview the app UI"
